<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <filter id="inkWarp" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.006" numOctaves="3" seed="13" result="t" />
      <feDisplacementMap in="SourceGraphic" in2="t" scale="18" xChannelSelector="R" yChannelSelector="G" result="d" />
      <feGaussianBlur in="d" stdDeviation="0.3" />
    </filter>

    <filter id="paperGrain" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="4" seed="4" result="n" />
      <feColorMatrix in="n" type="matrix" values="0.4 0 0 0 0  0 0.5 0 0 0  0 0 0.4 0 0  0 0 0 0.16 0" />
    </filter>

    <linearGradient id="chlorophyll" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.16" />
      <stop offset="0.55" stop-color="#16a34a" stop-opacity="0.08" />
      <stop offset="1" stop-color="#84cc16" stop-opacity="0.10" />
    </linearGradient>

    <pattern id="microDots" patternUnits="userSpaceOnUse" width="22" height="22">
      <circle cx="4" cy="6" r="1.1" fill="#22c55e" opacity="0.22" />
      <circle cx="16" cy="11" r="0.9" fill="#22c55e" opacity="0.14" />
      <circle cx="10" cy="18" r="0.8" fill="#84cc16" opacity="0.10" />
    </pattern>
  </defs>

  <rect width="1600" height="1000" fill="none" />

  <!-- soft green fog pockets -->
  <g opacity="0.14">
    <circle cx="420" cy="680" r="360" fill="url(#chlorophyll)" />
    <circle cx="1220" cy="360" r="420" fill="url(#chlorophyll)" opacity="0.85" />
    <circle cx="1100" cy="850" r="380" fill="url(#chlorophyll)" opacity="0.70" />
  </g>

  <!-- topo lines (ink map / organic) -->
  <g fill="none" stroke="#22c55e" stroke-linecap="round" stroke-linejoin="round" opacity="0.16" filter="url(#inkWarp)">
    <path d="M-80 220 C 140 120, 330 140, 520 230 C 710 320, 880 320, 1050 240 C 1230 160, 1420 130, 1760 190" stroke-width="3" />
    <path d="M-80 280 C 160 200, 360 210, 540 290 C 740 380, 930 380, 1110 290 C 1290 210, 1460 190, 1760 250" stroke-width="2.6" opacity="0.9" />
    <path d="M-80 350 C 160 290, 380 300, 560 370 C 770 450, 960 450, 1140 370 C 1320 300, 1480 290, 1760 330" stroke-width="2.2" opacity="0.85" />
    <path d="M-80 430 C 160 390, 400 390, 590 450 C 810 520, 1010 520, 1200 450 C 1380 390, 1520 390, 1760 420" stroke-width="2" opacity="0.8" />

    <path d="M-80 560 C 140 480, 340 490, 520 570 C 710 650, 900 650, 1080 560 C 1260 470, 1450 450, 1760 520" stroke-width="3" opacity="0.9" />
    <path d="M-80 630 C 160 560, 360 560, 540 630 C 750 710, 940 700, 1120 620 C 1300 540, 1460 520, 1760 600" stroke-width="2.4" opacity="0.82" />
    <path d="M-80 710 C 160 660, 380 660, 560 710 C 780 770, 980 760, 1160 700 C 1340 640, 1500 620, 1760 690" stroke-width="2" opacity="0.75" />

    <path d="M260 820 C 360 740, 500 750, 590 840 C 690 940, 560 990, 420 940 C 330 906, 300 880, 260 820" stroke-width="2.2" opacity="0.85" />
    <path d="M980 520 C 1080 440, 1220 460, 1300 550 C 1380 640, 1260 700, 1140 660 C 1060 634, 1020 600, 980 520" stroke-width="2.2" opacity="0.8" />
  </g>

  <!-- micro ecology dots (subtle) -->
  <g opacity="0.08">
    <rect x="0" y="0" width="1600" height="1000" fill="url(#microDots)" />
  </g>

  <!-- paper grain -->
  <rect width="1600" height="1000" fill="#0b0b0b" opacity="0" filter="url(#paperGrain)" />
</svg>
