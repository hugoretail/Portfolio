name: Deploy Astro to GitHub Pages!

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portfolio-hugo/package-lock.json

      - name: Install deps
        working-directory: portfolio-hugo
        run: npm ci

      - name: Build
        working-directory: portfolio-hugo
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: portfolio-hugo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Preflight Pages configuration
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data } = await github.rest.repos.getPages({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });

              core.info(`Pages preflight: ${JSON.stringify({
                html_url: data.html_url,
                cname: data.cname,
                build_type: data.build_type,
                source: data.source,
              }, null, 2)}`);

              if (data.build_type !== 'workflow') {
                core.setFailed('GitHub Pages source is not set to GitHub Actions. Go to Settings > Pages > Source and select GitHub Actions.');
              }
            } catch (error) {
              core.setFailed(`Failed to read GitHub Pages configuration via API: ${error.message}`);
            }

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
